name: Test workflow
on:
  workflow_call:
    inputs:
      matrix-step-name:
        required: false
        type: string
      matrix-key:
        required: false
        type: string
      in:
        required: true
        type: string
    outputs:
      result:
        description: "Result"
        value: ${{ jobs.do.outputs.result }}

jobs:
  do:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Setup
        run: echo "Do setup"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: step-security/github-action-matrix-outputs-write@f2d9b36ad90496c064ab6951cc9f76bbb1cd1101 # release
        id: writer
        with:
          matrix-step-name: ${{ inputs.matrix-step-name }}
          matrix-key: ${{ inputs.matrix-key }}
          outputs: |-
            result: ${{ inputs.in }}

    outputs:
      result: ${{ steps.writer.outputs.result }}