name: Test twice reusable workflow
on:
  pull_request: {}
  workflow_dispatch: {}

jobs:
  setup:
    uses: ./.github/workflows/setup-test.yml
    strategy:
      matrix:
        target: ["one", "two"]
    with:
      matrix-step-name: setup
      matrix-key: ${{ matrix.target }}
      in: ${{ matrix.target }}

  setup2:
    uses: ./.github/workflows/setup-test.yml
    strategy:
      matrix:
        target: ["three", "four"]
    with:
      matrix-step-name: setup2
      matrix-key: ${{ matrix.target }}
      in: ${{ matrix.target }}

  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [setup, setup2]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./
        id: current1
        with:
          matrix-step-name: setup

      - uses: ./
        id: current2
        with:
          matrix-step-name: setup2


    outputs:
      result1: "${{ steps.current1.outputs.result }}"
      result2: "${{ steps.current2.outputs.result }}"

  assert:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: nick-fields/assert-action@0efd6166067d9c59d89c710fab4f79fb066f8985 # v4.0.1
        with:
          expected: 'one'
          actual: ${{ fromJson(needs.test.outputs.result1).result.one }}

      - uses: nick-fields/assert-action@0efd6166067d9c59d89c710fab4f79fb066f8985 # v4.0.1
        with:
          expected: 'two'
          actual: ${{ fromJson(needs.test.outputs.result1).result.two }}

      - uses: nick-fields/assert-action@0efd6166067d9c59d89c710fab4f79fb066f8985 # v4.0.1
        with:
          expected: 'three'
          actual: ${{ fromJson(needs.test.outputs.result2).result.three }}

      - uses: nick-fields/assert-action@0efd6166067d9c59d89c710fab4f79fb066f8985 # v4.0.1
        with:
          expected: 'four'
          actual: ${{ fromJson(needs.test.outputs.result2).result.four }}

  teardown:
    runs-on: ubuntu-latest
    needs: [assert]
    if: ${{ always() }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Tear down
        run: echo "Do Tear down"
