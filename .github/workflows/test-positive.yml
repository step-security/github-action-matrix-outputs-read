name: Test example positive
on:
  pull_request: {}
  workflow_dispatch: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ["one", "two"]
    steps:
      - name: Setup
        run: echo "Do setup"

      - name: Checkout
        uses: actions/checkout@v7

      - uses: step-security/github-action-matrix-outputs-write@release
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.target }}
          outputs: |-
            result: ${{ matrix.target }}

  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [setup]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./
        id: current
        with:
          matrix-step-name: setup

    outputs:
      result: "${{ steps.current.outputs.result }}"

  assert:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: nick-fields/assert-action@v4
        with:
          expected: 'one'
          actual: ${{ fromJson(needs.test.outputs.result).result.one }}

      - uses: nick-fields/assert-action@v4
        with:
          expected: 'two'
          actual: ${{ fromJson(needs.test.outputs.result).result.two }}

  teardown:
    runs-on: ubuntu-latest
    needs: [assert]
    if: ${{ always() }}
    steps:
      - name: Tear down
        run: echo "Do Tear down"
